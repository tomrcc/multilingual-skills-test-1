label: Feature Carousel Grid
icon: view_carousel
description: Carousel bento box grid of cards to display features.
value:
  _component: page-sections/features/feature-carousel-grid
  id:
  eyebrowIcon: {}
  eyebrowText: Eyebrow text
  heading: "Feature Carousel Grid Heading"
  subtext: Subtext placeholder text that will be replaced with actual content.
  slides: []
  maxContentWidth: 3xl
  paddingVertical: 4xl
  colorScheme: inherit
  backgroundColor: base
  backgroundColorHeight: header
  contentBackground: false
  verticalOffset: {}
  rounded: false
_inputs_from_glob:
  - /src/components/page-sections/features/feature-carousel-grid/feature-carousel-grid.cloudcannon.inputs.yml
_structures:
  slides:
    values:
      - label: Slide
        value:
          _component: page-sections/features/feature-carousel-grid/feature-carousel-slide
          cards: []
        preview:
          icon: space_dashboard
        _inputs:
          cards:
            type: array
            options:
              structures:
                - label: Card
                  value:
                    _component: page-sections/features/feature-carousel-grid/feature-carousel-card
                    decorative: false
                    style: surface-linear-gradient
                    eyebrowIcon: {}
                    eyebrowText: ""
                    heading: Feature Carousel Card Title
                    text: Feature Carousel Card Description
                    columnSpan: 4
                    rowSpan: 1
                  preview:
                    icon: credit_card
                    text:
                      - key: heading
                      - key: style
                  _inputs:
                    decorative:
                      type: switch
                      comment: Card with background and no content.
                    style:
                      hidden: "!decorative"
                      type: select
                      comment: Style of the card.
                      options:
                        values:
                          - id: highlight-grid
                            name: Highlight Grid
                          - id: surface-linear-gradient
                            name: Surface Linear Gradient
                          - id: brand-linear-gradient-reverse
                            name: Brand Linear Gradient Reverse
                          - id: brand-linear-gradient
                            name: Brand Linear Gradient
                          - id: brand-linear-gradient-muted
                            name: Brand Linear Gradient Muted
                          - id: highlight-linear-gradient
                            name: Highlight Linear Gradient
                          - id: highlight-radial-gradient
                            name: Highlight Radial Gradient
                    eyebrowIcon:
                      hidden: decorative
                      type: object
                      comment: Optional icon for the card.
                      options:
                        structures: _structures.eyebrowIcon
                    eyebrowText:
                      hidden: decorative
                    heading:
                      hidden: decorative
                    text:
                      hidden: decorative
                    columnSpan:
                      type: range
                      comment: Column span of the card.
                      options:
                        min: 1
                        max: 12
                        step: 1
                    rowSpan:
                      type: range
                      comment: Row span of the card.
                      options:
                        min: 1
                        max: 4
                        step: 1
