text:
  comment: The content for the text component (Markdown format). Leave empty to use slot content instead.
  type: markdown
  options:
    blockquote: false
    bold: true
    format: p h1 h2 h3 h4 h5 h6 pre
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: true
    numberedlist: true
    indent: true
    outdent: true
alignmentHorizontal:
  type: select
  options:
    values:
      - id: start
        name: Start
      - id: center
        name: Center
      - id: end
        name: End
  comment: The horizontal alignment of the text component.
size:
  type: select
  comment: The font size of paragraphs and lists. Does not affect headings.
  options:
    values:
      - id: xs
        name: Extra Small
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
      - id: 2xl
        name: 2xl
      - id: 3xl
        name: 3xl
      - id: 4xl
        name: 4xl
