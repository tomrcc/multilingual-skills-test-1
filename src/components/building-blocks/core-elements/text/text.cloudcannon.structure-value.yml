label: Text
icon: edit_note
description: Content component for markdown-formatted text.
value:
  _component: building-blocks/core-elements/text
  _uuid:
  text: My text goes here.
  alignmentHorizontal: start
  size: md
preview:
  text:
    - Text
  subtext:
    - key: text
  icon: edit_note
picker_preview:
  text: Text
  subtext: Content component for markdown-formatted text.
# TEST: inlined from text.cloudcannon.inputs.yml. _inputs_from_glob does not
# resolve when this structure-value is itself imported via values_from_glob
# (glob-within-glob), so scoped inputs never loaded on nested split items.
_inputs:
  text:
    comment: The content for the text component (Markdown format). Leave empty to use slot content instead.
    type: markdown
    options:
      blockquote: false
      bold: true
      format: p h1 h2 h3 h4 h5 h6 pre
      italic: true
      link: true
      strike: false
      subscript: true
      superscript: true
      underline: false
      bulletedlist: true
      numberedlist: true
      indent: true
      outdent: true
  alignmentHorizontal:
    type: select
    options:
      values:
        - id: start
          name: Start
        - id: center
          name: Center
        - id: end
          name: End
    comment: The horizontal alignment of the text component.
  size:
    type: select
    comment: The font size of paragraphs and lists. Does not affect headings.
    options:
      values:
        - id: xs
          name: Extra Small
        - id: sm
          name: Small
        - id: md
          name: Medium
        - id: lg
          name: Large
        - id: xl
          name: Extra Large
        - id: 2xl
          name: 2xl
        - id: 3xl
          name: 3xl
        - id: 4xl
          name: 4xl
